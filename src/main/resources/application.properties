# ─── SERVER ───────────────────────────────────────────────
server.port=8080

# ─── DATABASE ─────────────────────────────────────────────
# Set these in your environment (never hardcode in source):
#   DB_URL      e.g. jdbc:mysql://localhost:3306/vaidya_vatika_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
#   DB_USERNAME e.g. root
#   DB_PASSWORD e.g. your_password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / HIBERNATE ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# Disable SQL logging in production — set to true locally via .env if needed
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── APP CONFIG ───────────────────────────────────────────
app.name=Vaidya Vatika
# Set ADMIN_PASSWORD in your environment — never commit a real password here
app.admin.password=${ADMIN_PASSWORD}

# ─── LOGGING ──────────────────────────────────────────────
# DEBUG locally, INFO in production
logging.level.com.vaidyavatika=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO

# ─── JWT ──────────────────────────────────────────────────
# JWT_SECRET must be at least 32 characters.
# Generate one with: openssl rand -hex 32
# JWT_EXPIRATION is in milliseconds — 86400000 = 24 hours
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
# ─── EMAIL (Gmail SMTP) ────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8

# ─── FRONTEND URL ─────────────────────────────────────────
# Used to build the verification link in emails.
# Change to your production URL when deploying.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}